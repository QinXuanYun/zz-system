<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>专业发展智诊系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #f0f2f5; color: #333; }
        
        /* Header */
        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-logo { width: 48px; height: 48px; background: rgba(255,255,255,0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .header h1 { font-size: 22px; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .year-select { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .year-select option { color: #333; background: #fff; }
        .user-info { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .logout-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .logout-btn:hover { background: rgba(255,255,255,0.25); }
        
        /* Login Page */
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
        .login-box { background: #fff; border-radius: 16px; padding: 48px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-logo { text-align: center; font-size: 48px; margin-bottom: 16px; }
        .login-title { text-align: center; font-size: 24px; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
        .login-sub { text-align: center; color: #999; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; font-weight: 500; }
        .form-input { width: 100%; padding: 12px 16px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; transition: all 0.2s; }
        .form-input:focus { outline: none; border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.1); }
        .login-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #1890ff, #0050b3); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(24,144,255,0.4); }
        .login-error { color: #ff4d4f; font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }
        
        /* Layout */
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        /* Nav tabs */
        .nav-tabs { display: flex; gap: 4px; background: #fff; border-radius: 10px; padding: 4px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .nav-tab { flex: 1; text-align: center; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: #666; transition: all 0.2s; }
        .nav-tab:hover { color: #1890ff; background: #e6f7ff; }
        .nav-tab.active { background: #1890ff; color: #fff; }
        
        /* Cards */
        .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .card-title::before { content: ''; width: 4px; height: 18px; background: #1890ff; border-radius: 2px; }
        
        /* Summary cards */
        .summary-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
        .summary-card { background: #fff; border-radius: 10px; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
        .summary-card .label { font-size: 13px; color: #999; margin-bottom: 8px; }
        .summary-card .value { font-size: 28px; font-weight: 700; }
        .summary-card .value.red { color: #ff4d4f; }
        .summary-card .value.yellow { color: #faad14; }
        .summary-card .value.blue { color: #1890ff; }
        .summary-card .value.green { color: #52c41a; }
        .summary-card .value.primary { color: #1a1a2e; }
        
        /* Major cards grid */
        .majors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .major-card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .major-card:hover { border-color: #1890ff; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(24,144,255,0.15); }
        .major-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .major-card-name { font-size: 16px; font-weight: 600; }
        .major-card-score { font-size: 14px; color: #999; }
        .major-card-score span { font-size: 20px; font-weight: 700; color: #1a1a2e; }
        
        /* Warning badges */
        .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .badge.red { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; }
        .badge.yellow { background: #fffbe6; color: #ad6800; border: 1px solid #ffe58f; }
        .badge.blue { background: #e6f7ff; color: #0050b3; border: 1px solid #91d5ff; }
        .badge.green { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
        .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
        .badge-dot.red { background: #ff4d4f; }
        .badge-dot.yellow { background: #faad14; }
        .badge-dot.blue { background: #1890ff; }
        .badge-dot.green { background: #52c41a; }
        
        /* Progress bar */
        .progress-bar { height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        
        /* Detail indicators */
        .indicator-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
        .indicator-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; background: #fafafa; }
        .indicator-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .indicator-dot.red { background: #ff4d4f; }
        .indicator-dot.yellow { background: #faad14; }
        .indicator-dot.blue { background: #1890ff; }
        .indicator-dot.green { background: #52c41a; }
        .indicator-info { flex: 1; }
        .indicator-name { font-size: 13px; color: #666; }
        .indicator-value { font-size: 16px; font-weight: 600; margin-top: 2px; }
        .indicator-trend { font-size: 12px; }
        .indicator-trend.up { color: #52c41a; }
        .indicator-trend.down { color: #ff4d4f; }
        .indicator-trend.stable { color: #999; }
        
        /* Charts */
        .chart-container { width: 100%; height: 400px; }
        .chart-container-sm { width: 100%; height: 300px; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        /* Compare section */
        .compare-checkboxes { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
        .compare-cb { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; padding: 6px 12px; border-radius: 6px; border: 1px solid #d9d9d9; font-size: 13px; transition: all 0.2s; user-select: none; }
        .compare-cb:has(input:checked) { border-color: #1890ff; background: #e6f7ff; color: #1890ff; }
        
        /* Warning table */
        .warning-table { width: 100%; border-collapse: collapse; }
        .warning-table th { background: #fafafa; padding: 10px 12px; text-align: left; font-size: 13px; color: #999; font-weight: 500; border-bottom: 1px solid #f0f0f0; }
        .warning-table td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
        .warning-table tr:hover { background: #fafafa; }
        .level-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .level-tag.red { background: #fff1f0; color: #cf1322; }
        .level-tag.yellow { background: #fffbe6; color: #ad6800; }
        .level-tag.blue { background: #e6f7ff; color: #0050b3; }
        
        /* Ranking */
        .ranking-list { }
        .ranking-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .ranking-num { width: 32px; font-size: 16px; font-weight: 700; flex-shrink: 0; text-align: center; font-family: 'Arial', sans-serif; }
        .ranking-num.r1 { color: #ff4d4f; text-shadow: 0 0 2px rgba(255,77,79,0.3); }
        .ranking-num.r2 { color: #fa8c16; text-shadow: 0 0 2px rgba(250,140,22,0.3); }
        .ranking-num.r3 { color: #1890ff; text-shadow: 0 0 2px rgba(24,144,255,0.3); }
        .ranking-num.r4 { color: #666; }
        .ranking-num.r5 { color: #999; }
        .ranking-name { flex: 1; font-size: 14px; font-weight: 500; }
        .ranking-bar { flex: 2; height: 20px; background: #f0f0f0; border-radius: 10px; overflow: hidden; position: relative; }
        .ranking-bar-fill { height: 100%; border-radius: 10px; transition: width 0.8s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 11px; color: #fff; font-weight: 600; }
        
        /* Report */
        .report-content { white-space: pre-wrap; font-size: 14px; line-height: 1.8; padding: 16px; background: #fafafa; border-radius: 8px; font-family: 'Courier New', monospace; }
        
        /* Tabs */
        .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab-btn { padding: 6px 16px; border-radius: 6px; border: 1px solid #d9d9d9; background: #fff; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .tab-btn:hover { border-color: #1890ff; color: #1890ff; }
        .tab-btn.active { background: #1890ff; color: #fff; border-color: #1890ff; }
        
        /* Sections */
        .section { display: none; }
        .section.active { display: block; }
        
        /* Back button */
        .back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 6px; border: 1px solid #d9d9d9; background: #fff; cursor: pointer; font-size: 13px; margin-bottom: 16px; transition: all 0.2s; }
        .back-btn:hover { border-color: #1890ff; color: #1890ff; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .summary-row { grid-template-columns: repeat(2, 1fr); }
            .majors-grid { grid-template-columns: 1fr; }
            .chart-row { grid-template-columns: 1fr; }
            .container { padding: 12px; }
            .header { padding: 16px; }
            .header h1 { font-size: 18px; }
        }
        
        /* Health score bar */
        .health-bar { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; margin-top: 6px; }
        .health-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

        /* Color legend */
        .color-legend { line-height: 1.8; }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-page">
        <div class="login-box">
            <div class="login-logo">🎓</div>
            <div class="login-title">专业发展智诊系统</div>
            
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" id="loginUsername" class="form-input" placeholder="请输入用户名" value="admin">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码" value="admin123">
            </div>
            <button class="login-btn" onclick="doLogin()">登 录</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>
    
    <!-- Main App -->
    <div id="mainApp" style="display:none">
        <div class="header">
            <div class="header-left">
                <div class="header-logo">🎓</div>
                <div><h1>专业发展智诊系统</h1></div>
            </div>
            <div class="header-right">
                <button class="logout-btn" onclick="showImportModal()" style="margin-right:8px;background:#52c41a;border-color:#52c41a;">📥 导入</button>
                <select class="year-select" id="yearSelect" onchange="switchYear(this.value)"></select>
                <div class="user-info">
                    <span>👤 <span id="userDisplay">admin</span></span>
                    <button class="logout-btn" onclick="doLogout()">退出</button>
                </div>
            </div>
        </div>
        <div class="container">
            <div class="nav-tabs">
                <div class="nav-tab active" onclick="showSection('overview')">📊 总览</div>
                <div class="nav-tab" onclick="showSection('warnings')">🚨 预警</div>
                <div class="nav-tab" onclick="showSection('ranking')">🏆 排行</div>
                <div class="nav-tab" onclick="showSection('report')">📋 报告</div>
            </div>
            
            <!-- Overview Section -->
            <div class="section active" id="sec-overview">
                <div class="summary-row" id="summaryRow"></div>
                <div class="color-legend" id="colorLegend" style="display:none;background:#f8f9fa;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:13px;color:#666;">
                    <span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#1890ff;margin-right:4px;vertical-align:middle;"></span>蓝色：数值在正常范围内，但较上一年下降≥5%
                    <span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#52c41a;margin-left:16px;margin-right:4px;vertical-align:middle;"></span>绿色：数值在正常范围内
                    <span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#faad14;margin-left:16px;margin-right:4px;vertical-align:middle;"></span>黄色：数值趋于不正常范围
                    <span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:#ff4d4f;margin-left:16px;margin-right:4px;vertical-align:middle;"></span>红色：数值不在正常范围内
                </div>
                
                <!-- Ranking card -->
                <div class="card"><div class="card-title">🏆 专业综合排行榜 （得分）</div>
                    <div class="ranking-list" id="dashboardRanking"></div>
                </div>
                
                <div class="majors-grid" id="majorsGrid"></div>
                
                <!-- Detail panel -->
                <div id="detailPanel" style="display:none">
                    <button class="back-btn" onclick="hideDetail()">← 返回总览</button>
                    <div class="card"><div class="card-title" id="detailTitle"></div>
                        <div class="indicator-list" id="detailIndicators"></div>
                    </div>
                    <div class="chart-row">
                        <div class="card"><div class="card-title">📈 趋势分析</div><div class="chart-container" id="trendChart"></div></div>
                        <div class="card"><div class="card-title">🎯 指标雷达图</div><div class="chart-container" id="radarSingle"></div></div>
                    </div>
                </div>
            </div>
            
            <!-- Warnings Section -->
            <div class="section" id="sec-warnings">
                <div class="card"><div class="card-title">🚨 预警汇总</div>
                    <table class="warning-table" id="warningTable"><thead><tr><th>专业</th><th>指标</th><th>当前值</th><th>预警级别</th><th>变化</th></tr></thead><tbody></tbody></table>
                </div>
                <div class="card"><div class="card-title">📊 预警分布</div><div class="chart-container" id="warningChart"></div></div>
            </div>
            
            <!-- Ranking Section -->
            <div class="section" id="sec-ranking">
                <div class="card"><div class="card-title">📈 专业对比</div>
                    <div class="compare-checkboxes" id="rankingCompareCbs"></div>
                    <div class="chart-container" id="rankingRadarCompare"></div>
                </div>
                <div class="card"><div class="card-title">📊 各指标排行 （数值）</div>
                    <div class="tab-bar" id="rankingTabs"></div>
                    <div class="chart-container" id="rankingByIndicator" style="height: 500px;"></div>
                </div>
            </div>
            
            <!-- Report Section -->
            <div class="section" id="sec-report">
                <div class="card"><div class="card-title">📋 选择专业生成诊断报告</div>
                    <div class="tab-bar" id="reportTabs"></div>
                </div>
                <div class="card" id="reportCard" style="display:none">
                    <div class="card-title" id="reportTitle"></div>
                    <div class="report-content" id="reportContent"></div>
                    <div style="margin-top:16px"><button class="tab-btn active" onclick="downloadReport()">📥 下载报告</button></div>
                </div>
                <div class="chart-row" id="reportCharts" style="display:none">
                    <div class="card"><div class="card-title">🎯 指标雷达</div><div class="chart-container" id="reportRadar"></div></div>
                    <div class="card"><div class="card-title">📊 数据分布</div><div class="chart-container" id="reportBar"></div></div>
                </div>
            </div>
        </div>
    </div>

<script>
// ==================== AUTH ====================
let token = localStorage.getItem('zyzd_token');
let currentYear = null;

async function doLogin() {
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('loginError');
    
    try {
        const resp = await fetch(API_BASE_URL + '/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        
        if (resp.ok) {
            const data = await resp.json();
            token = data.access_token;
            localStorage.setItem('zyzd_token', token);
            localStorage.setItem('zyzd_username', data.username);
            showMainApp();
        } else {
            const err = await resp.json();
            errorEl.textContent = err.detail || '登录失败';
        }
    } catch(e) {
        errorEl.textContent = '网络错误，请重试';
    }
}

function doLogout() {
    token = null;
    localStorage.removeItem('zyzd_token');
    localStorage.removeItem('zyzd_username');
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
}

function showMainApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userDisplay').textContent = localStorage.getItem('zyzd_username') || 'admin';
    initApp();
}

// API基础URL - 自动检测环境，使用相对路径
const API_BASE_URL = '';

async function api(url, opts = {}) {
    const headers = {'Content-Type': 'application/json'};
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const fullUrl = url.startsWith('http') ? url : API_BASE_URL + url;
    const resp = await fetch(fullUrl, {...opts, headers});
    if (resp.status === 401) {
        doLogout();
        throw new Error('Unauthorized');
    }
    if (!resp.ok) throw new Error('API error: ' + resp.status);
    return resp.json();
}

// ==================== INIT ====================
let dashData = null;
let warningChart = null;
// 页面加载时间，用于报告生成时间
const pageLoadTime = new Date();

async function initApp(targetYear = null) {
    try {
        // If targetYear is specified, fetch data for that year
        const url = targetYear ? `/api/dashboard?year=${encodeURIComponent(targetYear)}` : '/api/dashboard';
        dashData = await api(url);
        
        // Only update currentYear if not switching years
        if (!targetYear) {
            currentYear = dashData.year;
        } else {
            currentYear = targetYear;
        }
        
        // Populate year select
        const yearSelect = document.getElementById('yearSelect');
        yearSelect.innerHTML = dashData.years.map(y => 
            `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`
        ).join('');
        
        // Set the select value to current year
        yearSelect.value = currentYear;
        
        renderDashboard(dashData);
        await initWarnings();
    } catch(e) {
        console.error('Init error:', e);
    }
}

function switchYear(year) {
    currentYear = year;
    initApp(year);
}

// ==================== DASHBOARD ====================
function renderDashboard(data) {
    // Show color legend
    document.getElementById('colorLegend').style.display = 'block';

    // Summary row
    if (!data.summary) {
        console.error('Dashboard summary is missing!');
        document.getElementById('summaryRow').innerHTML = '<div style="color:red">数据加载错误</div>';
        return;
    }
    const s = data.summary;
    console.log('Dashboard summary:', s);
    document.getElementById('summaryRow').innerHTML = `
        <div class="summary-card"><div class="label">专业总数</div><div class="value primary">${s.totalMajors}</div></div>
        <div class="summary-card"><div class="label">红色预警</div><div class="value red">${s.red}</div></div>
        <div class="summary-card"><div class="label">黄色预警</div><div class="value yellow">${s.yellow}</div></div>
        <div class="summary-card"><div class="label">蓝色关注</div><div class="value blue">${s.blue}</div></div>
        <div class="summary-card"><div class="label">绿色正常</div><div class="value green">${s.green}</div></div>
    `;
    
    // Dashboard ranking
    renderDashboardRanking(data.ranking);
    
    // Major cards
    const grid = document.getElementById('majorsGrid');
    grid.innerHTML = data.majors.map(m => {
        // 使用综合排行榜得分
        const healthScore = m.score !== undefined ? m.score : m.healthScore;
        // 健康度进度条颜色统一为 RGB(0, 128, 128)
        const scoreColor = 'rgb(0, 128, 128)';

async function renderSingleRadar(majorId, year) {
    const comp = await api(`/api/compare?majors=${majorId}&year=${year}`);
    const chart = echarts.init(document.getElementById('radarSingle'));
    
    const m = comp.majors[0];
    
    // 获取所有专业的数据来计算每个指标的平均值
    const allComp = await api(`/api/compare?year=${year}`);
    const indicatorCount = comp.indicators.length;
    const avgScores = [];
    
    for (let i = 0; i < indicatorCount; i++) {
        let sum = 0;
        let count = 0;
        allComp.majors.forEach(major => {
            if (major.scores[i] !== undefined) {
                sum += major.scores[i];
                count++;
            }
        });
        avgScores.push(count > 0 ? Math.round(sum / count * 10) / 10 : 0);
    }
    
    chart.setOption({
        radar: {
            indicator: comp.indicators.map(i => ({name: i.name, max: 100})),
            radius: '65%'
        },
        series: [{
            type: 'radar',
            data: [
                {value: m.scores, name: m.name, areaStyle: {opacity: 0.2}, itemStyle: {color: '#1890ff'}},
                {value: avgScores, name: '各专业平均值', areaStyle: {opacity: 0.05}, lineStyle: {color: '#999', type: 'dashed'}, itemStyle: {color: '#999'}}
            ]
        }]
    });
}

async function initWarnings() {
    try {
        // Ensure currentYear is set
        if (!currentYear) {
            console.log('currentYear not set, skipping warnings');
            return;
        }
        console.log('Fetching warnings for year:', currentYear);
        const data = await api(`/api/warnings?year=${encodeURIComponent(currentYear)}`);
        console.log('Warnings data:', data);
        
        if (!data.warnings || data.warnings.length === 0) {
            console.log('No warnings found');
            document.querySelector('#warningTable tbody').innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999;">暂无预警数据</td></tr>';
            // Reset chart
            if (warningChart) {
                warningChart.setOption({
                    series: [{
                        data: [
                            {value: 0, name: '红色预警', itemStyle: {color: '#ff4d4f'}},
                            {value: 0, name: '黄色预警', itemStyle: {color: '#faad14'}},
                            {value: 0, name: '蓝色关注', itemStyle: {color: '#1890ff'}}
                        ]
                    }]
                });
            }
            return;
        }
        
        // Table
        const tbody = document.querySelector('#warningTable tbody');
        tbody.innerHTML = data.warnings.map(w => {
            // formatVal already handles :1 suffix for ratio format
            let displayValue = formatVal(w.value, w.format);
            let changeText = '-';
            console.log('Warning item:', w.majorName, w.indicatorName, 'change:', w.change, 'format:', w.format, 'level:', w.level);
            
            // For blue warnings, show "下降>=5%" to indicate the blue warning reason
            // Blue warning definition: value >= green_threshold AND decreased by >= 5%
            if (w.change !== null && w.change !== undefined && !isNaN(w.change)) {
                const changeVal = parseFloat(w.change);
                const absChange = Math.abs(changeVal).toFixed(2);
                
                // For blue warnings, always show "下降>=5%" (unified display)
                if (w.level === 'blue') {
                    changeText = `↓ 下降>=5%`;
                } else if (changeVal > 0) {
                    changeText = `↑ 上升 ${absChange}`;
                    // Add unit based on format
                    if (w.format === 'pct') {
                        changeText += '%';
                    } else if (w.format === 'days') {
                        changeText += '天';
                    }
                } else if (changeVal < 0) {
                    changeText = `↓ 下降 ${absChange}`;
                    // Add unit based on format
                    if (w.format === 'pct') {
                        changeText += '%';
                    } else if (w.format === 'days') {
                        changeText += '天';
                    }
                } else {
                    changeText = '→ 不变';
                }
            } else {
                // No previous year data
                changeText = '-（无上年数据）';
            }
            return `
            <tr>
                <td>${w.majorName}</td>
                <td>${w.indicatorName}</td>
                <td>${displayValue}</td>
                <td><span class="level-tag ${w.level}">${w.level === 'red' ? '🔴 红色' : w.level === 'yellow' ? '🟡 黄色' : '🔵 蓝色'}</span></td>
                <td>${changeText}</td>
            </tr>`;
        }).join('');
        
        // Chart
        const counts = {red: 0, yellow: 0, blue: 0};
        data.warnings.forEach(w => counts[w.level]++);
        
        console.log('Warning counts:', counts);
        console.log('All warning levels:', data.warnings.map(w => w.level));
        
        warningChart = echarts.init(document.getElementById('warningChart'));
        warningChart.setOption({
            tooltip: {trigger: 'item'},
            legend: {top: 0, left: 'center'},
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                data: [
                    {value: counts.red, name: '红色预警', itemStyle: {color: '#ff4d4f'}},
                    {value: counts.yellow, name: '黄色预警', itemStyle: {color: '#faad14'}},
                    {value: counts.blue, name: '蓝色关注', itemStyle: {color: '#1890ff'}}
                ]
            }]
        });
    } catch(e) {
        console.error('Warnings error:', e);
    }
}

async function renderRankingCompareChart() {
    if (rankingCompareMajorIds.length === 0) return;

    const majorIds = rankingCompareMajorIds.map(id => String(id));
    const comp = await api(`/api/compare?majors=${majorIds.join(',')}&year=${currentYear}`);
    
    if (!rankingCompareChartInst) {
        rankingCompareChartInst = echarts.init(document.getElementById('rankingRadarCompare'));
    }
    
    const colors = ['#ff6b6b','#1890ff','#52c41a','#faad14','#9c27b0'];
    
    // 获取指标格式信息
    const barData = await api(`/api/indicator/bar?year=${currentYear}`);
    
    // 计算每个指标的最大值用于雷达图刻度
    const indicatorMax = {};
    comp.indicators.forEach(ind => {
        const indData = barData.data[ind.id];
        if (indData && indData.items) {
            const maxVal = Math.max(...indData.items.map(item => item.value), 1);
            // 向上取整到合适的刻度
            indicatorMax[ind.id] = Math.ceil(maxVal * 1.1);
        } else {
            indicatorMax[ind.id] = 100;
        }
    });
    
    // 获取所有专业的数据来计算每个指标的平均值
    const allComp = await api(`/api/compare?year=${currentYear}`);
    const indicatorCount = comp.indicators.length;
    const avgScores = [];
    
    for (let i = 0; i < indicatorCount; i++) {
        let sum = 0;
        let count = 0;
        allComp.majors.forEach(major => {
            if (major.scores[i] !== undefined) {
                sum += major.scores[i];
                count++;
            }
        });
        avgScores.push(count > 0 ? Math.round(sum / count * 10) / 10 : 0);
    }
    
    // 构建series数据
    const seriesData = comp.majors.map((m, i) => ({
        value: m.scores,
        name: m.name,
        areaStyle: {opacity: 0.1},
        itemStyle: {color: colors[i] || colors[0]}
    }));
    
    // 添加平均值线
    seriesData.push({
        value: avgScores,
        name: '各专业平均值',
        areaStyle: {opacity: 0.05},
        lineStyle: {color: '#999', type: 'dashed', width: 2},
        itemStyle: {color: '#999'},
        symbol: 'none'
    });
    
    // 确保legend数据与series数据一致
    const legendData = [...comp.majors.map(m => m.name), '各专业平均值'];
    
    rankingCompareChartInst.setOption({
        tooltip: {
            trigger: 'item',
            formatter: function(params) {
                let result = '<strong>' + params.name + '</strong><br/>';
                params.value.forEach((val, idx) => {
                    const indId = comp.indicators[idx].id;
                    const indData = barData.data[indId];
                    const unit = indData ? (indData.format === 'pct' ? '%' : indData.format === 'ratio' ? ':1' : indData.format === 'days' ? '天' : '') : '';
                    result += comp.indicators[idx].name + ': ' + val.toFixed(2) + unit + '<br/>';
                });
                return result;
            }
        },
        legend: {
            top: 0,
            data: legendData,
            type: 'scroll'  // 当专业数量多时显示滚动条
        },
        radar: {
            indicator: comp.indicators.map(i => ({name: i.name, max: indicatorMax[i.id] || 100})),
            radius: '65%'
        },
        series: [{
            type: 'radar',
            data: seriesData
        }]
    }, true);  // true 表示不合并，完全替换配置
}

async function renderReportRadar(data) {
    const chart = echarts.init(document.getElementById('reportRadar'));
    reportRadarChart = chart;

    const indicators = ['X1','X2','X3','X4','X5','X6','X7','X8','X9','X10','X11','X12','X13','X14','X15'];
    const names = ['报到率','生师比','课程优良率','技能证书通过率','毕业率','就业去向落实率','专业相关度','在校生满意度','毕业生满意度','企业订单学生占比','双师型专任教师占比','高级职称专任教师占比','高技术技能人才占比','师均论文数、著作数、课题数','教师人均企业实践时间'];

    // Normalize values to 0-100 scale
    const scores = indicators.map((id, i) => {
        const item = [...(data.red||[]),...(data.yellow||[]),...(data.blue||[]),...(data.green||[])].find(it => it.id === id);
        if (!item) return 0;
        const val = item.value;
        if (i === 1) return Math.max(0, Math.min(100, (22-val)/(22-18)*100)); // 生师比
        if (i === 13) return Math.min(val / 2 * 100, 100); // X14: 师均论文数、著作数、课题数 (max 2)
        if (i === 14) return Math.min(val / 30 * 100, 100); // X15: 教师人均企业实践时间 (max 30天)
        return val * 100; // 百分比指标
    });

    // 计算每个指标的平均值（使用后端提供的indicatorAverages）
    const avgScores = indicators.map((id, i) => {
        const avgData = data.indicatorAverages && data.indicatorAverages[id];
        if (!avgData) return 50; // 默认值
        
        const val = avgData.value;
        if (i === 1) return Math.max(0, Math.min(100, (22-val)/(22-18)*100)); // 生师比
        if (i === 13) return Math.min(val / 2 * 100, 100); // X14
        if (i === 14) return Math.min(val / 30 * 100, 100); // X15
        return val * 100; // 百分比指标
    });

    chart.setOption({
        radar: {
            indicator: names.map(n => ({name: n, max: 100})),
            radius: '65%'
        },
        series: [{
            type: 'radar',
            data: [
                {value: scores, name: data.majorName, areaStyle: {opacity: 0.2}, itemStyle: {color: '#1890ff'}},
                {value: avgScores, name: '各专业平均值', areaStyle: {opacity: 0.1}, lineStyle: {color: '#999'}, itemStyle: {color: '#999'}}
            ]
        }]
    });
}

async function renderReportBar(data) {
    const chart = echarts.init(document.getElementById('reportBar'));
    reportBarChart = chart;

    // Use allItems from API (already sorted)
    const allItems = data.allItems || [...(data.red||[]),...(data.yellow||[]),...(data.blue||[]),...(data.green||[])];
    const colors = {red: '#ff4d4f', yellow: '#faad14', blue: '#1890ff', green: '#52c41a'};

    chart.setOption({
            tooltip: {
            trigger: 'axis',
            formatter: function(params) {
                const item = allItems[params[0].dataIndex];
                let val = item.value;
                const fmt = item.format || 'num';
                if (fmt === 'pct') {
                    val = val * 100;
                }
                const displayVal = parseFloat(val.toFixed(2));
                return item.name + '<br/>指标数值: ' + displayVal + (fmt === 'pct' ? '%' : '');
            }
        },
        legend: {data: ['指标数值'], top: 0},
        xAxis: {type: 'category', data: allItems.map(i => i.name), axisLabel: {rotate: 30, interval: 0, fontSize: 11}},
        yAxis: {type: 'value', max: 100, name: '数值/分数'},
        series: [
            {
                name: '指标数值',
                type: 'bar',
                data: allItems.map(i => {
                    let val = i.value;
                    const fmt = i.format || 'num';
                    // 根据格式正确转换显示值
                    if (fmt === 'pct') {
                        val = val * 100; // 0-1小数转为百分比
                    }
                    // ratio/num/days 不需要乘100
                    return {
                        value: parseFloat(val.toFixed(2)),
                        itemStyle: {color: colors[i.level]}
                    };
                })
            }
        ],
        grid: {top: 50, bottom: 100, left: 70, right: 30}
    });
}

// ==================== SECTIONS ====================
function showSection(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('sec-' + name).classList.add('active');
    event.target.classList.add('active');
    
    // Init section if needed
    if (name === 'report') initReport();
    if (name === 'ranking') initRanking();
    
    // Resize charts
    setTimeout(() => {
        if (warningChart) warningChart.resize();
        if (reportRadarChart) reportRadarChart.resize();
        if (reportBarChart) reportBarChart.resize();
        if (rankingCompareChartInst) rankingCompareChartInst.resize();
        if (rankingByIndicatorChart) rankingByIndicatorChart.resize();
    }, 100);
}

// ==================== HELPERS ====================
function formatVal(val, fmt) {
    if (val === null || val === undefined) return 'N/A';
    if (fmt === 'pct') return (val * 100).toFixed(2) + '%';
    if (fmt === 'ratio') return val.toFixed(2);
    if (fmt === 'days') return val.toFixed(0) + '天';
    return val.toFixed(2);
}

// ==================== IMPORT ====================
function showImportModal() {
    document.getElementById('importModal').style.display = 'flex';
}

function hideImportModal() {
    document.getElementById('importModal').style.display = 'none';
    document.getElementById('importFile').value = '';
    document.getElementById('importYear').value = '';
    document.getElementById('importStatus').textContent = '';
}

async function doImport() {
    const fileInput = document.getElementById('importFile');
    const yearInput = document.getElementById('importYear');
    const statusEl = document.getElementById('importStatus');
    
    if (!fileInput.files.length) {
        statusEl.textContent = '请选择文件';
        statusEl.style.color = '#ff4d4f';
        return;
    }
    
    const file = fileInput.files[0];
    const formData = new FormData();
    formData.append('file', file);
    if (yearInput.value) {
        formData.append('year', yearInput.value);
    }
    
    statusEl.textContent = '正在上传...';
    statusEl.style.color = '#1890ff';
    
    try {
        const resp = await fetch(API_BASE_URL + '/api/import', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token
            },
            body: formData
        });
        
        const data = await resp.json();
        
        if (resp.ok) {
            statusEl.textContent = data.message;
            statusEl.style.color = '#52c41a';
            setTimeout(() => {
                hideImportModal();
                initApp(); // Refresh data
            }, 1500);
        } else {
            statusEl.textContent = data.detail || '导入失败';
            statusEl.style.color = '#ff4d4f';
        }
    } catch(e) {
        statusEl.textContent = '网络错误: ' + e.message;
        statusEl.style.color = '#ff4d4f';
    }
}

// ==================== DATA PREVIEW ====================
async function showDataPreview() {
    const modal = document.getElementById('dataPreviewModal');
    const content = document.getElementById('dataPreviewContent');
    modal.style.display = 'flex';
    content.innerHTML = '<p>加载中...</p>';
    
    try {
        // Get years
        const yearsResp = await api('/api/years');
        const years = yearsResp.years || [];
        
        if (years.length === 0) {
            content.innerHTML = '<p style="color:#999;">数据库中暂无数据</p>';
            return;
        }
        
        let html = '<div style="margin-bottom:20px;">';
        html += '<h4 style="margin-bottom:12px;">📅 可用学年</h4>';
        html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
        years.forEach(year => {
            html += `<span style="padding:4px 12px;background:#e6f7ff;color:#1890ff;border-radius:4px;font-size:12px;">${year}</span>`;
        });
        html += '</div></div>';
        
        // Show data for each year
        for (const year of years.slice(0, 3)) { // Show max 3 years
            html += `<div style="margin-bottom:24px;padding:16px;background:#f8f9fa;border-radius:8px;">`;
            html += `<h4 style="margin-bottom:12px;color:#1a1a2e;">📊 ${year}</h4>`;
            
            try {
                const data = await api(`/api/dashboard?year=${encodeURIComponent(year)}`);
                
                // Summary
                html += '<div style="margin-bottom:16px;">';
                html += '<h5 style="font-size:13px;color:#666;margin-bottom:8px;">概览</h5>';
                html += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;">';
                html += `<div style="text-align:center;padding:8px;background:#fff;border-radius:6px;"><div style="font-size:20px;font-weight:700;color:#1a1a2e;">${data.summary.totalMajors}</div><div style="font-size:11px;color:#999;">专业数</div></div>`;
                html += `<div style="text-align:center;padding:8px;background:#fff;border-radius:6px;"><div style="font-size:20px;font-weight:700;color:#ff4d4f;">${data.summary.red}</div><div style="font-size:11px;color:#999;">红色</div></div>`;
                html += `<div style="text-align:center;padding:8px;background:#fff;border-radius:6px;"><div style="font-size:20px;font-weight:700;color:#faad14;">${data.summary.yellow}</div><div style="font-size:11px;color:#999;">黄色</div></div>`;
                html += `<div style="text-align:center;padding:8px;background:#fff;border-radius:6px;"><div style="font-size:20px;font-weight:700;color:#1890ff;">${data.summary.blue}</div><div style="font-size:11px;color:#999;">蓝色</div></div>`;
                html += `<div style="text-align:center;padding:8px;background:#fff;border-radius:6px;"><div style="font-size:20px;font-weight:700;color:#52c41a;">${data.summary.green}</div><div style="font-size:11px;color:#999;">绿色</div></div>`;
                html += '</div></div>';
                
                // Majors
                html += '<div>';
                html += '<h5 style="font-size:13px;color:#666;margin-bottom:8px;">专业列表</h5>';
                html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;">';
                data.majors.slice(0, 8).forEach(m => {
                    const color = m.healthScore >= 80 ? '#52c41a' : m.healthScore >= 60 ? '#faad14' : m.healthScore >= 40 ? '#1890ff' : '#ff4d4f';
                    html += `<div style="padding:12px;background:#fff;border-radius:6px;border-left:3px solid ${color};">`;
                    html += `<div style="font-weight:500;margin-bottom:4px;">${m.name}</div>`;
                    html += `<div style="font-size:12px;color:#666;">健康度: <span style="color:${color};font-weight:600;">${m.healthScore.toFixed(2)}</span></div>`;
                    html += `<div style="font-size:11px;color:#999;margin-top:4px;">`;
                    html += `🟢${m.counts.green} 🟡${m.counts.yellow} 🔴${m.counts.red}`;
                    html += '</div></div>';
                });
                if (data.majors.length > 8) {
                    html += `<div style="padding:12px;background:#f0f0f0;border-radius:6px;text-align:center;color:#999;font-size:12px;">还有 ${data.majors.length - 8} 个专业...</div>`;
                }
                html += '</div></div>';
                
            } catch(e) {
                html += `<p style="color:#ff4d4f;">加载 ${year} 数据失败</p>`;
            }
            
            html += '</div>';
        }
        
        content.innerHTML = html;
        
    } catch(e) {
        content.innerHTML = `<p style="color:#ff4d4f;">加载数据失败: ${e.message}</p>`;
    }
}

function hideDataPreview() {
    document.getElementById('dataPreviewModal').style.display = 'none';
}
