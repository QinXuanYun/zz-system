<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业发展智诊系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            color: #8892b0;
            margin-top: 5px;
            font-size: 14px;
        }
        
        .container {
            padding: 30px 40px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .summary-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .summary-card h3 {
            font-size: 14px;
            color: #8892b0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .summary-card .value {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
        }
        
        .summary-card .sub {
            font-size: 14px;
            color: #64ffda;
            margin-top: 4px;
        }
        
        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title::before {
            content: "";
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #00d4ff, #7b2ff7);
            border-radius: 2px;
        }
        
        .majors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .major-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .major-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .major-card.active {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        
        .major-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .major-name {
            font-size: 18px;
            font-weight: 600;
        }
        
        .major-score {
            text-align: right;
        }
        
        .major-score .score {
            font-size: 28px;
            font-weight: 700;
            color: #00d4ff;
        }
        
        .major-score .rate {
            font-size: 12px;
            color: #8892b0;
        }
        
        .warning-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-green { background: rgba(82, 196, 26, 0.2); color: #52c41a; }
        .badge-blue { background: rgba(24, 144, 255, 0.2); color: #1890ff; }
        .badge-yellow { background: rgba(250, 173, 20, 0.2); color: #faad14; }
        .badge-red { background: rgba(245, 34, 45, 0.2); color: #f5222d; }
        
        .indicator-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .indicator-tag {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            background: rgba(255, 255, 255, 0.05);
            color: #8892b0;
            border-left: 3px solid;
        }
        
        .indicator-tag.green { border-color: #52c41a; }
        .indicator-tag.blue { border-color: #1890ff; }
        .indicator-tag.yellow { border-color: #faad14; }
        .indicator-tag.red { border-color: #f5222d; }
        
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 900px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }
        
        .chart-container {
            height: 400px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 16px;
        }
        
        .report-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
        }
        
        .report-content {
            font-size: 14px;
            line-height: 1.8;
            color: #ccd6f6;
            white-space: pre-wrap;
        }
        
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #8892b0;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            color: #fff;
            border: none;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #f5222d;
        }
        
        .rank-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .rank-table th,
        .rank-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .rank-table th {
            color: #8892b0;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .rank-table tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .rank-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            font-size: 12px;
            margin-right: 8px;
        }
        
        .rank-num.top1 { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; }
        .rank-num.top2 { background: linear-gradient(135deg, #c0c0c0, #808080); color: #000; }
        .rank-num.top3 { background: linear-gradient(135deg, #cd7f32, #8b4513); color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎓 专业发展智诊系统</h1>
        <p>数据驱动的专业建设质量监测与预警平台 | 2020学年数据</p>
    </div>
    
    <div class="container">
        <!-- Summary Cards -->
        <div class="summary-cards" id="summaryCards">
            <div class="summary-card">
                <h3>专业数量</h3>
                <div class="value" id="totalMajors">-</div>
                <div class="sub">个专业</div>
            </div>
            <div class="summary-card">
                <h3>平均得分</h3>
                <div class="value" id="avgScore">-</div>
                <div class="sub">最高: <span id="maxScore">-</span></div>
            </div>
            <div class="summary-card">
                <h3>平均得分率</h3>
                <div class="value" id="avgRate">-</div>
                <div class="sub">%</div>
            </div>
            <div class="summary-card">
                <h3>预警统计</h3>
                <div class="value" id="warningCount">-</div>
                <div class="sub">红色预警指标</div>
            </div>
        </div>
        
        <!-- Major Cards -->
        <div class="section">
            <div class="section-title">专业健康状态概览</div>
            <div class="majors-grid" id="majorsGrid">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <!-- Charts -->
        <div class="section">
            <div class="section-title">数据可视化分析</div>
            <div class="tab-bar">
                <button class="tab-btn active" onclick="showChart('radar')">雷达图对比</button>
                <button class="tab-btn" onclick="showChart('bar')">得分对比</button>
                <button class="tab-btn" onclick="showChart('ranking')">排行榜</button>
            </div>
            <div class="charts-row" id="chartArea">
                <div class="chart-container" id="mainChart"></div>
                <div class="chart-container" id="secondChart"></div>
            </div>
        </div>
        
        <!-- Report Section -->
        <div class="section">
            <div class="section-title">智能分析报告</div>
            <div class="tab-bar" id="reportTabs">
                <!-- Tabs will be generated dynamically -->
            </div>
            <div class="report-section">
                <div class="report-content" id="reportContent">
                    <div class="loading">请选择左侧专业查看详细报告</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Global state
        let allWarnings = [];
        let allReports = [];
        let selectedMajor = null;
        let radarChart, barChart;
        
        // API Base URL
        const API_BASE = window.location.origin;
        
        // Colors
        const colors = {
            green: '#52c41a',
            blue: '#1890ff',
            yellow: '#faad14',
            red: '#f5222d',
            gradient1: '#00d4ff',
            gradient2: '#7b2ff7'
        };
        
        // Initialize
        async function init() {
            try {
                await Promise.all([
                    loadSummary(),
                    loadWarnings(),
                    loadRadarData(),
                    loadAllReports()
                ]);
            } catch (error) {
                console.error('Init error:', error);
            }
        }
        
        // Load summary data
        async function loadSummary() {
            const res = await fetch(`${API_BASE}/api/summary`);
            const data = await res.json();
            
            document.getElementById('totalMajors').textContent = data.totalMajors;
            document.getElementById('avgScore').textContent = data.avgScore;
            document.getElementById('maxScore').textContent = data.maxScore;
            document.getElementById('avgRate').textContent = data.avgRate;
        }
        
        // Load warnings for all majors
        async function loadWarnings() {
            const res = await fetch(`${API_BASE}/api/warnings`);
            const data = await res.json();
            allWarnings = data.warnings;
            
            // Update warning count
            const totalRed = allWarnings.reduce((sum, w) => sum + w.redCount, 0);
            document.getElementById('warningCount').textContent = totalRed;
            
            // Render major cards
            renderMajorCards();
        }
        
        // Render major cards
        function renderMajorCards() {
            const grid = document.getElementById('majorsGrid');
            
            grid.innerHTML = allWarnings.map(w => `
                <div class="major-card ${selectedMajor === w.majorId ? 'active' : ''}" 
                     onclick="selectMajor('${w.majorId}')">
                    <div class="major-header">
                        <div class="major-name">${w.majorName}</div>
                        <div class="major-score">
                            <div class="score">${w.totalScore.toFixed(1)}</div>
                            <div class="rate">${(w.scoreRate * 100).toFixed(1)}%</div>
                        </div>
                    </div>
                    <div class="warning-badges">
                        ${w.greenCount > 0 ? `<span class="badge badge-green">绿色 ${w.greenCount}</span>` : ''}
                        ${w.yellowCount > 0 ? `<span class="badge badge-yellow">黄色 ${w.yellowCount}</span>` : ''}
                        ${w.redCount > 0 ? `<span class="badge badge-red">红色 ${w.redCount}</span>` : ''}
                    </div>
                    <div class="indicator-list">
                        ${w.greenIndicators.map(i => `<span class="indicator-tag green">${i}</span>`).join('')}
                        ${w.yellowIndicators.map(i => `<span class="indicator-tag yellow">${i}</span>`).join('')}
                        ${w.redIndicators.map(i => `<span class="indicator-tag red">${i}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        // Select major and show report
        async function selectMajor(majorId) {
            selectedMajor = majorId;
            renderMajorCards();
            
            const report = allReports.find(r => r.major === allWarnings.find(w => w.majorId === majorId)?.majorName);
            if (report) {
                showReport(report);
            }
        }
        
        // Show report
        function showReport(report) {
            const content = document.getElementById('reportContent');
            content.textContent = report.reportText;
        }
        
        // Load radar data
        async function loadRadarData() {
            const res = await fetch(`${API_BASE}/api/radar`);
            const data = await res.json();
            renderRadarChart(data);
            renderBarChart(data);
        }
        
        // Render radar chart
        function renderRadarChart(data) {
            const chartDom = document.getElementById('mainChart');
            if (!chartDom) return;
            
            if (radarChart) radarChart.dispose();
            radarChart = echarts.init(chartDom);
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                    borderColor: 'rgba(255, 255, 255, 0.1)',
                    textStyle: { color: '#fff' }
                },
                legend: {
                    data: data.majors.map(m => m.majorName),
                    textStyle: { color: '#8892b0' },
                    bottom: 10
                },
                radar: {
                    indicator: data.indicators.map((name, i) => ({
                        name,
                        max: 100
                    })),
                    shape: 'polygon',
                    splitNumber: 4,
                    axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } },
                    splitLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } },
                    splitArea: { areaStyle: { color: ['rgba(0, 212, 255, 0.05)', 'transparent'] } },
                    name: { textStyle: { color: '#ccd6f6', fontSize: 12 } }
                },
                series: [{
                    type: 'radar',
                    data: data.majors.map((m, i) => ({
                        value: m.scores,
                        name: m.majorName,
                        lineStyle: { width: 2 },
                        areaStyle: { opacity: 0.3 },
                        itemStyle: { color: [colors.green, colors.blue, colors.yellow, colors.red, '#7b2ff7'][i] }
                    }))
                }]
            };
            
            radarChart.setOption(option);
        }
        
        // Render bar chart
        function renderBarChart(data) {
            const chartDom = document.getElementById('secondChart');
            if (!chartDom) return;
            
            if (barChart) barChart.dispose();
            barChart = echarts.init(chartDom);
            
            const sortedMajors = [...data.majors].sort((a, b) => {
                const sumA = a.scores.reduce((s, v) => s + v, 0);
                const sumB = b.scores.reduce((s, v) => s + v, 0);
                return sumB - sumA;
            });
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                    textStyle: { color: '#fff' }
                },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: sortedMajors.map(m => m.majorName),
                    axisLabel: { color: '#8892b0', rotate: 0, fontSize: 11 },
                    axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } }
                },
                yAxis: {
                    type: 'value',
                    max: 100,
                    axisLabel: { color: '#8892b0' },
                    splitLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.05)' } }
                },
                series: [{
                    type: 'bar',
                    data: sortedMajors.map((m, i) => ({
                        value: (m.scores.reduce((s, v) => s + v, 0) / m.scores.length).toFixed(1),
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: [colors.green, colors.blue, colors.yellow, colors.red][i % 4] },
                                { offset: 1, color: 'rgba(0, 0, 0, 0.3)' }
                            ]),
                            borderRadius: [4, 4, 0, 0]
                        }
                    })),
                    barWidth: '50%'
                }]
            };
            
            barChart.setOption(option);
        }
        
        // Load all reports
        async function loadAllReports() {
            const res = await fetch(`${API_BASE}/api/all-reports`);
            const data = await res.json();
            allReports = data.reports;
            
            // Generate report tabs
            const tabsContainer = document.getElementById('reportTabs');
            tabsContainer.innerHTML = data.reports.map((r, i) => `
                <button class="tab-btn ${i === 0 ? 'active' : ''}" 
                        onclick="switchReport(${i})">${r.major}</button>
            `).join('');
            
            // Show first report
            if (data.reports.length > 0) {
                showReport(data.reports[0]);
            }
        }
        
        // Switch report tab
        function switchReport(index) {
            const tabs = document.querySelectorAll('#reportTabs .tab-btn');
            tabs.forEach((t, i) => t.classList.toggle('active', i === index));
            showReport(allReports[index]);
        }
        
        // Show specific chart
        function showChart(type) {
            const tabs = document.querySelectorAll('.tab-bar .tab-btn');
            tabs.forEach(t => {
                if (t.textContent.includes('对比') || t.textContent.includes('排行榜') || t.textContent.includes('排名')) {
                    t.classList.toggle('active', 
                        (type === 'radar' && t.textContent.includes('雷达')) ||
                        (type === 'bar' && t.textContent.includes('得分')) ||
                        (type === 'ranking' && t.textContent.includes('排行')));
                }
            });
            
            const chartArea = document.getElementById('chartArea');
            
            if (type === 'ranking') {
                // Show ranking table
                const sorted = [...allWarnings].sort((a, b) => b.totalScore - a.totalScore);
                chartArea.innerHTML = `
                    <div style="grid-column: 1 / -1;">
                        <table class="rank-table">
                            <thead>
                                <tr>
                                    <th>排名</th>
                                    <th>专业名称</th>
                                    <th>总分</th>
                                    <th>得分率</th>
                                    <th>绿色指标</th>
                                    <th>黄色预警</th>
                                    <th>红色预警</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${sorted.map((w, i) => `
                                    <tr>
                                        <td><span class="rank-num ${i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : ''}">${i + 1}</span></td>
                                        <td>${w.majorName}</td>
                                        <td style="color: #00d4ff; font-weight: 600;">${w.totalScore.toFixed(2)}</td>
                                        <td>${(w.scoreRate * 100).toFixed(1)}%</td>
                                        <td><span class="badge badge-green">${w.greenCount}</span></td>
                                        <td><span class="badge badge-yellow">${w.yellowCount}</span></td>
                                        <td><span class="badge badge-red">${w.redCount}</span></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } else {
                chartArea.innerHTML = `
                    <div class="chart-container" id="mainChart"></div>
                    <div class="chart-container" id="secondChart"></div>
                `;
                
                if (type === 'radar') {
                    loadRadarData();
                } else if (type === 'bar') {
                    loadRadarData();
                }
            }
        }
        
        // Window resize handler
        window.addEventListener('resize', () => {
            if (radarChart) radarChart.resize();
            if (barChart) barChart.resize();
        });
        
        // Start
        init();
    </script>
</body>
</html>
