<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学院整体驾驶舱 - 专业发展智诊系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(180deg, #f0f4f8 0%, #e6ebf2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }
        
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
        }
        
        .header-kpis {
            display: flex;
            gap: 24px;
        }
        
        .kpi-item {
            text-align: center;
            color: #fff;
        }
        
        .kpi-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2px;
        }
        
        .kpi-value {
            font-size: 16px;
            font-weight: 600;
        }
        
        /* Main Container */
        .container {
            padding: 24px 32px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        /* Section Title */
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a365d;
            margin-bottom: 16px;
            padding-left: 12px;
            border-left: 4px solid #4A90E2;
        }
        
        /* Warning Summary */
        .warning-summary {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .warning-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .warning-badge.red {
            background: rgba(255, 77, 79, 0.12);
            color: #ff4d4f;
        }
        
        .warning-badge.yellow {
            background: rgba(255, 193, 7, 0.12);
            color: #d48806;
        }
        
        .warning-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .warning-dot.red { background: #ff4d4f; }
        .warning-dot.yellow { background: #ffc107; }
        
        /* Major Cards Grid */
        .majors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .major-card {
            background: #fff;
            border-radius: 10px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border: 1px solid #e8ecf0;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .major-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            transform: translateY(-2px);
        }
        
        .major-card.active {
            border-color: #4A90E2;
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
        }
        
        .major-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .major-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .major-icon.normal { background: rgba(74, 144, 226, 0.12); color: #4A90E2; }
        .major-icon.warning { background: rgba(255, 193, 7, 0.12); color: #d48806; }
        .major-icon.alert { background: rgba(255, 77, 79, 0.12); color: #ff4d4f; }
        
        .major-name {
            font-size: 14px;
            font-weight: 600;
            color: #1a365d;
        }
        
        .major-sub {
            font-size: 11px;
            color: #8c98a9;
            margin-top: 2px;
        }
        
        .major-stats {
            display: flex;
            gap: 12px;
        }
        
        .stat-item {
            text-align: center;
            flex: 1;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #1a365d;
        }
        
        .stat-label {
            font-size: 10px;
            color: #8c98a9;
            margin-top: 2px;
        }
        
        /* Charts Section */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        
        @media (max-width: 1024px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }
        
        .chart-card {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border: 1px solid #e8ecf0;
        }
        
        .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a365d;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .chart-title::before {
            content: "";
            width: 4px;
            height: 16px;
            background: linear-gradient(180deg, #4A90E2, #007BFF);
            border-radius: 2px;
        }
        
        .chart-container {
            height: 280px;
        }
        
        /* Legend */
        .chart-legend {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            justify-content: center;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #666;
        }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        /* Indicator Charts */
        .indicator-section {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border: 1px solid #e8ecf0;
            margin-bottom: 24px;
        }
        
        .indicator-charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 900px) {
            .indicator-charts-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .indicator-chart-card {
            background: #f8fafc;
            border-radius: 8px;
            padding: 16px;
        }
        
        .indicator-chart-title {
            font-size: 13px;
            font-weight: 600;
            color: #1a365d;
            margin-bottom: 12px;
        }
        
        .indicator-chart-container {
            height: 250px;
        }
        
        /* Report Section */
        .report-section {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border: 1px solid #e8ecf0;
        }
        
        .report-content {
            font-size: 13px;
            line-height: 1.8;
            color: #555;
            white-space: pre-wrap;
        }
        
        /* Tabs */
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 8px 16px;
            background: #f0f4f8;
            border: 1px solid #e8ecf0;
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
        }
        
        .tab-btn:hover {
            background: #e6ebf2;
        }
        
        .tab-btn.active {
            background: #4A90E2;
            color: #fff;
            border-color: #4A90E2;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #8c98a9;
        }
        
        /* Color dots for indicators */
        .indicator-dots {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .dot.green { background: #52c41a; }
        .dot.blue { background: #4A90E2; }
        .dot.yellow { background: #ffc107; }
        .dot.red { background: #ff4d4f; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏛️ 学院整体驾驶舱</h1>
        <div class="header-kpis">
            <div class="kpi-item">
                <div class="kpi-label">监测专业</div>
                <div class="kpi-value" id="totalMajors">-</div>
            </div>
            <div class="kpi-item">
                <div class="kpi-label">数据周期</div>
                <div class="kpi-value">2020学年</div>
            </div>
            <div class="kpi-item">
                <div class="kpi-label">平均就业率</div>
                <div class="kpi-value" id="avgEmployment">-</div>
            </div>
            <div class="kpi-item">
                <div class="kpi-label">平均专业相关度</div>
                <div class="kpi-value" id="avgRelevance">-</div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <!-- Warning Summary -->
        <div class="section-title">专业健康状态</div>
        <div class="warning-summary" id="warningSummary">
            <div class="warning-badge red">
                <span class="warning-dot red"></span>
                <span>红色预警 <strong id="totalRed">0</strong> 个</span>
            </div>
            <div class="warning-badge yellow">
                <span class="warning-dot yellow"></span>
                <span>黄色预警 <strong id="totalYellow">0</strong> 个</span>
            </div>
        </div>
        
        <!-- Major Cards -->
        <div class="majors-grid" id="majorsGrid">
            <div class="loading">加载中...</div>
        </div>
        
        <!-- Charts -->
        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-title">三年就业率趋势</div>
                <div class="chart-container" id="lineChart"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">专业指标雷达对比</div>
                <div class="chart-container" id="radarChart"></div>
            </div>
        </div>
        
        <!-- Indicators Detail -->
        <div class="indicator-section">
            <div class="section-title">指标详情</div>
            <div class="tab-bar" id="indicatorTabs">
                <!-- Tabs will be generated dynamically -->
            </div>
            <div class="indicator-charts-grid">
                <div class="indicator-chart-card">
                    <div class="indicator-chart-title">各项指标得分</div>
                    <div class="indicator-chart-container" id="indicatorBarChart"></div>
                </div>
                <div class="indicator-chart-card">
                    <div class="indicator-chart-title">各项指标得分率</div>
                    <div class="indicator-chart-container" id="indicatorHorizontalChart"></div>
                </div>
            </div>
        </div>
        
        <!-- Report -->
        <div class="report-section">
            <div class="section-title">智能分析报告</div>
            <div class="tab-bar" id="reportTabs">
                <!-- Tabs will be generated dynamically -->
            </div>
            <div class="report-content" id="reportContent">
                <div class="loading">请选择左侧专业查看详细报告</div>
            </div>
        </div>
    </div>
    
    <script>
        // Global state
        let allWarnings = [];
        let allReports = [];
        let selectedMajor = null;
        let lineChart, radarChart, barChart, horizontalBarChart;
        
        // API Base URL
        const API_BASE = window.location.origin;
        
        // Colors
        const colors = {
            green: '#52c41a',
            blue: '#4A90E2',
            yellow: '#ffc107',
            red: '#ff4d4f',
            orange: '#ff7a45',
            purple: '#722ed1'
        };
        
        // Initialize
        async function init() {
            try {
                await Promise.all([
                    loadMajors(),
                    loadWarnings(),
                    loadRadarData(),
                    loadAllReports()
                ]);
            } catch (error) {
                console.error('Init error:', error);
            }
        }
        
        // Load majors list
        async function loadMajors() {
            const res = await fetch(`${API_BASE}/api/majors`);
            const data = await res.json();
            
            document.getElementById('totalMajors').textContent = data.majors.length;
            document.getElementById('avgEmployment').textContent = data.summary.avgEmployment + '%';
            document.getElementById('avgRelevance').textContent = data.summary.avgRelevance + '%';
        }
        
        // Load warnings for all majors
        async function loadWarnings() {
            const res = await fetch(`${API_BASE}/api/warnings`);
            const data = await res.json();
            allWarnings = data.warnings;
            
            // Update warning counts
            let totalRed = 0, totalYellow = 0;
            allWarnings.forEach(w => {
                totalRed += w.redCount;
                totalYellow += w.yellowCount;
            });
            document.getElementById('totalRed').textContent = totalRed;
            document.getElementById('totalYellow').textContent = totalYellow;
            
            // Render major cards
            renderMajorCards();
        }
        
        // Render major cards
        function renderMajorCards() {
            const grid = document.getElementById('majorsGrid');
            
            grid.innerHTML = allWarnings.map(w => {
                // Determine overall status
                let status = 'normal';
                let statusText = '正常';
                let statusClass = 'normal';
                
                if (w.redCount > 0) {
                    status = 'alert';
                    statusText = '红色预警';
                    statusClass = 'alert';
                } else if (w.yellowCount > 0) {
                    status = 'warning';
                    statusText = '黄色预警';
                    statusClass = 'warning';
                }
                
                // Get first warning indicator name
                let subText = w.redIndicators[0] || w.yellowIndicators[0] || '各项指标正常';
                
                return `
                    <div class="major-card ${selectedMajor === w.majorId ? 'active' : ''}" 
                         onclick="selectMajor('${w.majorId}')">
                        <div class="major-header">
                            <div class="major-icon ${statusClass}">
                                ${status === 'normal' ? '✓' : status === 'warning' ? '!' : '✗'}
                            </div>
                            <div>
                                <div class="major-name">${w.majorName}</div>
                                <div class="major-sub">${subText}</div>
                            </div>
                        </div>
                        <div class="major-stats">
                            <div class="stat-item">
                                <div class="stat-value">${w.totalScore.toFixed(1)}</div>
                                <div class="stat-label">总分</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${(w.scoreRate * 100).toFixed(0)}%</div>
                                <div class="stat-label">得分率</div>
                            </div>
                        </div>
                        <div class="indicator-dots">
                            ${w.greenCount > 0 ? `<span class="dot green" title="绿色${w.greenCount}个"></span>` : ''}
                            ${w.yellowCount > 0 ? `<span class="dot yellow" title="黄色${w.yellowCount}个"></span>` : ''}
                            ${w.redCount > 0 ? `<span class="dot red" title="红色${w.redCount}个"></span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Select major
        async function selectMajor(majorId) {
            selectedMajor = majorId;
            renderMajorCards();
            
            // Load indicators for this major
            await loadIndicators(majorId);
            
            // Show report
            const warn = allWarnings.find(w => w.majorId === majorId);
            const report = allReports.find(r => r.major === warn?.majorName);
            if (report) {
                showReport(report);
            }
        }
        
        // Load indicators for a major and render bar charts
        async function loadIndicators(majorId) {
            const res = await fetch(`${API_BASE}/api/indicators/${majorId}`);
            const data = await res.json();
            
            renderBarCharts(data.indicators);
        }
        
        // Render bar charts for indicators
        function renderBarCharts(indicators) {
            // Chart 1: Score comparison bar chart
            const barDom = document.getElementById('indicatorBarChart');
            if (barDom) {
                if (barChart) barChart.dispose();
                barChart = echarts.init(barDom);
                
                const sortedIndicators = [...indicators].sort((a, b) => (b.score / b.weight) - (a.score / a.weight));
                
                const barOption = {
                    backgroundColor: 'transparent',
                    tooltip: {
                        trigger: 'axis',
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        borderColor: '#e8ecf0',
                        textStyle: { color: '#333' },
                        formatter: function(params) {
                            const ind = sortedIndicators[params[0].dataIndex];
                            return `${ind.name}<br/>得分: ${ind.score} / ${ind.weight}<br/>得分率: ${ind.percentage}%`;
                        }
                    },
                    grid: { left: '3%', right: '8%', bottom: '3%', top: '3%', containLabel: true },
                    xAxis: {
                        type: 'value',
                        max: function(value) { return Math.ceil(value.max / 5) * 5 + 2; },
                        axisLabel: { color: '#666' },
                        splitLine: { lineStyle: { color: '#e8ecf0' } }
                    },
                    yAxis: {
                        type: 'category',
                        data: sortedIndicators.map(i => i.name),
                        axisLabel: { color: '#666', fontSize: 11 },
                        axisLine: { lineStyle: { color: '#e8ecf0' } }
                    },
                    series: [{
                        type: 'bar',
                        data: sortedIndicators.map(ind => {
                            let color = colors.green;
                            if (ind.level === 'yellow') color = colors.yellow;
                            else if (ind.level === 'red') color = colors.red;
                            else if (ind.level === 'blue') color = colors.blue;
                            
                            return {
                                value: ind.score,
                                itemStyle: {
                                    color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                                        { offset: 0, color: color },
                                        { offset: 1, color: color + '99' }
                                    ]),
                                    borderRadius: [0, 4, 4, 0]
                                }
                            };
                        }),
                        barWidth: '60%',
                        label: {
                            show: true,
                            position: 'right',
                            formatter: '{c}',
                            color: '#666',
                            fontSize: 11
                        }
                    }]
                };
                
                barChart.setOption(barOption);
            }
            
            // Chart 2: Horizontal bar chart for score rate
            const hBarDom = document.getElementById('indicatorHorizontalChart');
            if (hBarDom) {
                if (horizontalBarChart) horizontalBarChart.dispose();
                horizontalBarChart = echarts.init(hBarDom);
                
                const option = {
                    backgroundColor: 'transparent',
                    tooltip: {
                        trigger: 'axis',
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        borderColor: '#e8ecf0',
                        textStyle: { color: '#333' },
                        formatter: function(params) {
                            const ind = indicators[params[0].dataIndex];
                            return `${ind.name}<br/>得分率: ${ind.percentage}%`;
                        }
                    },
                    grid: { left: '3%', right: '12%', bottom: '3%', top: '3%', containLabel: true },
                    xAxis: {
                        type: 'value',
                        max: 100,
                        axisLabel: { color: '#666', formatter: '{value}%' },
                        splitLine: { lineStyle: { color: '#e8ecf0' } }
                    },
                    yAxis: {
                        type: 'category',
                        data: indicators.map(i => i.name),
                        axisLabel: { color: '#666', fontSize: 11 },
                        axisLine: { lineStyle: { color: '#e8ecf0' } }
                    },
                    series: [{
                        type: 'bar',
                        data: indicators.map(ind => {
                            let color = colors.green;
                            if (ind.percentage < 60) color = colors.red;
                            else if (ind.percentage < 75) color = colors.yellow;
                            else if (ind.percentage < 85) color = colors.blue;
                            
                            return {
                                value: ind.percentage,
                                itemStyle: {
                                    color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                                        { offset: 0, color: color },
                                        { offset: 1, color: color + '99' }
                                    ]),
                                    borderRadius: [0, 4, 4, 0]
                                }
                            };
                        }),
                        barWidth: '50%',
                        label: {
                            show: true,
                            position: 'right',
                            formatter: '{c}%',
                            color: '#666',
                            fontSize: 11
                        }
                    }]
                };
                
                horizontalBarChart.setOption(option);
            }
        }
        
        // Show report
        function showReport(report) {
            const content = document.getElementById('reportContent');
            content.textContent = report.reportText;
        }
        
        // Load radar data
        async function loadRadarData() {
            const res = await fetch(`${API_BASE}/api/radar`);
            const data = await res.json();
            renderLineChart(data);
            renderRadarChart(data);
        }
        
        // Render line chart
        function renderLineChart(data) {
            const chartDom = document.getElementById('lineChart');
            if (!chartDom) return;
            
            if (lineChart) lineChart.dispose();
            lineChart = echarts.init(chartDom);
            
            // Mock three-year data based on current scores
            const years = ['2018学年', '2019学年', '2020学年'];
            const majorNames = data.majors.map(m => m.majorName);
            
            const series = data.majors.slice(0, 4).map((m, i) => ({
                name: m.majorName,
                type: 'line',
                smooth: true,
                data: m.scores.slice(0, 3).map((s, idx) => {
                    // Generate mock historical data
                    const base = s * 0.9 + (idx * 3);
                    return (base + Math.random() * 10).toFixed(1);
                }),
                lineStyle: { width: 2 },
                itemStyle: { color: [colors.blue, colors.green, colors.yellow, colors.red][i] },
                areaStyle: { opacity: 0.1 }
            }));
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(255, 255, 255, 0.95)',
                    borderColor: '#e8ecf0',
                    textStyle: { color: '#333' }
                },
                legend: {
                    data: majorNames.slice(0, 4),
                    bottom: 0,
                    textStyle: { color: '#666', fontSize: 11 }
                },
                grid: { left: '3%', right: '4%', bottom: '20%', top: '10%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: years,
                    axisLine: { lineStyle: { color: '#e8ecf0' } },
                    axisLabel: { color: '#666' }
                },
                yAxis: {
                    type: 'value',
                    max: 100,
                    axisLine: { show: false },
                    splitLine: { lineStyle: { color: '#f0f4f8' } },
                    axisLabel: { color: '#666' }
                },
                series: series
            };
            
            lineChart.setOption(option);
        }
        
        // Render radar chart
        function renderRadarChart(data) {
            const chartDom = document.getElementById('radarChart');
            if (!chartDom) return;
            
            if (radarChart) radarChart.dispose();
            radarChart = echarts.init(chartDom);
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(255, 255, 255, 0.95)',
                    borderColor: '#e8ecf0',
                    textStyle: { color: '#333' }
                },
                legend: {
                    data: data.majors.map(m => m.majorName),
                    bottom: 0,
                    textStyle: { color: '#666', fontSize: 11 }
                },
                radar: {
                    indicator: data.indicators.map(name => ({
                        name,
                        max: 100
                    })),
                    shape: 'polygon',
                    splitNumber: 4,
                    axisLine: { lineStyle: { color: '#e8ecf0' } },
                    splitLine: { lineStyle: { color: '#f0f4f8' } },
                    splitArea: { show: false },
                    name: { textStyle: { color: '#666', fontSize: 11 } }
                },
                series: [{
                    type: 'radar',
                    data: data.majors.map((m, i) => ({
                        value: m.scores,
                        name: m.majorName,
                        lineStyle: { width: 2 },
                        areaStyle: { opacity: 0.15 },
                        itemStyle: { color: [colors.blue, colors.green, colors.yellow, colors.red, colors.purple][i] }
                    }))
                }]
            };
            
            radarChart.setOption(option);
        }
        
        // Load all reports
        async function loadAllReports() {
            const res = await fetch(`${API_BASE}/api/all-reports`);
            const data = await res.json();
            allReports = data.reports;
            
            // Generate indicator tabs (same as report tabs)
            const tabsContainer = document.getElementById('indicatorTabs');
            tabsContainer.innerHTML = data.reports.map((r, i) => `
                <button class="tab-btn ${i === 0 ? 'active' : ''}" 
                        onclick="switchMajorAndShowIndicators(${i})">${r.major}</button>
            `).join('');
            
            // Generate report tabs
            const reportTabs = document.getElementById('reportTabs');
            reportTabs.innerHTML = data.reports.map((r, i) => `
                <button class="tab-btn ${i === 0 ? 'active' : ''}" 
                        onclick="switchReport(${i})">${r.major}</button>
            `).join('');
            
            // Show first report and indicators
            if (data.reports.length > 0) {
                showReport(data.reports[0]);
                if (allWarnings.length > 0) {
                    selectMajor(allWarnings[0].majorId);
                }
            }
        }
        
        // Switch report tab
        function switchReport(index) {
            const tabs = document.querySelectorAll('#reportTabs .tab-btn');
            tabs.forEach((t, i) => t.classList.toggle('active', i === index));
            showReport(allReports[index]);
            
            // Also update major card selection
            const majorId = allWarnings[index]?.majorId;
            if (majorId) {
                selectedMajor = majorId;
                renderMajorCards();
            }
        }
        
        // Switch major and show indicators
        function switchMajorAndShowIndicators(index) {
            const tabs = document.querySelectorAll('#indicatorTabs .tab-btn');
            tabs.forEach((t, i) => t.classList.toggle('active', i === index));
            
            const majorId = allWarnings[index]?.majorId;
            if (majorId) {
                selectMajor(majorId);
            }
        }
        
        // Window resize handler
        window.addEventListener('resize', () => {
            if (lineChart) lineChart.resize();
            if (radarChart) radarChart.resize();
            if (barChart) barChart.resize();
            if (horizontalBarChart) horizontalBarChart.resize();
        });
        
        // Start
        init();
    </script>
</body>
</html>
